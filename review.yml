  - date: '2026-06-03'
    rating: 3
    summary: >-
      Cardiff University runs a real, public WSO2 API Manager developer portal at
      data.cardiff.ac.uk/devportal. The portal's anonymous devportal API
      (/api/am/devportal/v2/apis) returned a live catalog of five published APIs:
      Courses, Modules, Lookups, Publications and EchoTest, all served from the
      gateway at api.data.cardiff.ac.uk. Endpoints are OAuth2-secured (a direct
      call to /courses/v1 returned HTTP 401), and external developer access is
      granted on request via integration@cardiff.ac.uk. The marketing landing
      page (data.cardiff.ac.uk root) and several institutional sites
      (www.cardiff.ac.uk, orca.cardiff.ac.uk) bot-block automated requests with
      403 but are reachable in a browser. No endpoints were fabricated; only the
      five APIs confirmed live in the portal catalog are cataloged.
